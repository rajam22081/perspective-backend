name: Deploy Atelier Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/atelier-read-chunk/**"
      - "supabase/functions/atelier-design-page/**"
      - ".github/workflows/deploy-atelier.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy atelier-read-chunk
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy atelier-read-chunk --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}" --no-verify-jwt

      - name: Deploy atelier-design-page
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy atelier-design-page --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}" --no-verify-jwt
